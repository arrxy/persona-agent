# DigitalOcean App Platform spec
# Create: doctl apps create --spec .do/app.yaml
# Update: doctl apps update <app-id> --spec .do/app.yaml

name: persona-ai
region: nyc

services:
  - name: api
    github:
      repo: arrxy/persona-agent
      branch: master
      deploy_on_push: true
    dockerfile_path: Dockerfile
    run_command: node dist/server.js
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 90
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 9
    envs:
      - key: DOTENV_PRIVATE_KEY
        scope: RUN_TIME
        type: SECRET

workers:
  - name: worker
    github:
      repo: arrxy/persona-agent
      branch: master
      deploy_on_push: true
    dockerfile_path: Dockerfile
    run_command: node dist/worker.js
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DOTENV_PRIVATE_KEY
        scope: RUN_TIME
        type: SECRET
