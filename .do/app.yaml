# DigitalOcean App Platform spec
# Create: doctl apps create --spec .do/app.yaml
# Update: doctl apps update <app-id> --spec .do/app.yaml

name: persona-ai
region: nyc

services:
  - name: api
    github:
      repo: arrxy/persona-agent
      branch: master
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
    envs:
      - key: DOTENV_PRIVATE_KEY
        scope: RUN_TIME
        type: SECRET

workers:
  - name: worker
    github:
      repo: arrxy/persona-agent
      branch: master
      deploy_on_push: true
    dockerfile_path: Dockerfile
    # DO run_command replaces Docker ENTRYPOINT — must invoke dotenvx explicitly
    run_command: ./node_modules/.bin/dotenvx run -f .env.production -- node dist/worker.js
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DOTENV_PRIVATE_KEY
        scope: RUN_TIME
        type: SECRET
