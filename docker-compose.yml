services:
  api:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env.keys
    environment:
      DOTENV_ENV: local
      PORT: 3000
      # Override encrypted .env values with docker-internal service URLs.
      MONGODB_URI: mongodb://mongo:27017/persona-ai
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped

  worker:
    build: .
    command: ["node", "dist/worker.js"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env.keys
    environment:
      DOTENV_ENV: local
      MONGODB_URI: mongodb://mongo:27017/persona-ai
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  qdrant_data:
